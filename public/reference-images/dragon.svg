<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Long curvy tail -->
  <path d="M280,310 Q340,330 360,300 Q380,270 355,255 Q335,245 320,265 Q310,278 295,290" fill="#3A9A3A" stroke="#1A5A1A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tail tip spike -->
  <polygon points="360,300 385,285 370,315" fill="#44BB44" stroke="#1A5A1A" stroke-width="3"/>
  <!-- Body (round/chubby) -->
  <ellipse cx="200" cy="280" rx="110" ry="90" fill="#44BB44" stroke="#1A5A1A" stroke-width="5"/>
  <!-- Belly (lighter) -->
  <ellipse cx="200" cy="290" rx="70" ry="65" fill="#88DD88" stroke="#44BB44" stroke-width="3"/>
  <!-- Scale dots on body -->
  <circle cx="160" cy="250" r="7" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <circle cx="185" cy="240" r="7" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <circle cx="212" cy="238" r="7" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <circle cx="238" cy="245" r="7" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <circle cx="255" cy="262" r="7" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <circle cx="148" cy="275" r="7" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <circle cx="260" cy="280" r="7" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <!-- Left wing -->
  <path d="M165,230 Q115,160 80,130 Q50,105 55,145 Q60,175 100,195 Q120,205 155,225" fill="#9966CC" stroke="#5533AA" stroke-width="4"/>
  <!-- Left wing inner membrane -->
  <path d="M165,225 Q120,175 90,155 Q75,148 80,165 Q85,182 115,195 Q135,205 160,220" fill="#BB99EE" opacity="0.6"/>
  <!-- Wing veins -->
  <line x1="165" y1="228" x2="90" y2="155" stroke="#5533AA" stroke-width="2"/>
  <line x1="155" y1="230" x2="82" y2="178" stroke="#5533AA" stroke-width="2"/>
  <line x1="148" y1="235" x2="78" y2="200" stroke="#5533AA" stroke-width="2"/>
  <!-- Right wing -->
  <path d="M235,230 Q285,160 320,130 Q350,105 345,145 Q340,175 300,195 Q280,205 245,225" fill="#9966CC" stroke="#5533AA" stroke-width="4"/>
  <!-- Right wing inner membrane -->
  <path d="M235,225 Q280,175 310,155 Q325,148 320,165 Q315,182 285,195 Q265,205 240,220" fill="#BB99EE" opacity="0.6"/>
  <!-- Wing veins -->
  <line x1="235" y1="228" x2="310" y2="155" stroke="#5533AA" stroke-width="2"/>
  <line x1="245" y1="230" x2="318" y2="178" stroke="#5533AA" stroke-width="2"/>
  <line x1="252" y1="235" x2="322" y2="200" stroke="#5533AA" stroke-width="2"/>
  <!-- Small clawed feet -->
  <!-- Left foot -->
  <ellipse cx="150" cy="358" rx="30" ry="18" fill="#44BB44" stroke="#1A5A1A" stroke-width="4"/>
  <polygon points="130,355 122,372 138,360" fill="#44BB44" stroke="#1A5A1A" stroke-width="3"/>
  <polygon points="150,355 148,373 160,358" fill="#44BB44" stroke="#1A5A1A" stroke-width="3"/>
  <polygon points="168,357 172,373 178,360" fill="#44BB44" stroke="#1A5A1A" stroke-width="3"/>
  <!-- Right foot -->
  <ellipse cx="250" cy="358" rx="30" ry="18" fill="#44BB44" stroke="#1A5A1A" stroke-width="4"/>
  <polygon points="230,355 222,372 238,360" fill="#44BB44" stroke="#1A5A1A" stroke-width="3"/>
  <polygon points="250,355 248,373 260,358" fill="#44BB44" stroke="#1A5A1A" stroke-width="3"/>
  <polygon points="268,357 272,373 278,360" fill="#44BB44" stroke="#1A5A1A" stroke-width="3"/>
  <!-- Head (round) -->
  <circle cx="200" cy="165" r="80" fill="#44BB44" stroke="#1A5A1A" stroke-width="5"/>
  <!-- Head scales -->
  <circle cx="175" cy="140" r="6" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <circle cx="200" cy="132" r="6" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <circle cx="225" cy="140" r="6" fill="#33AA33" stroke="#1A5A1A" stroke-width="2"/>
  <!-- Two small horns -->
  <polygon points="175,100 162,65 188,95" fill="#CC8822" stroke="#884400" stroke-width="3"/>
  <polygon points="225,100 212,65 238,95" fill="#CC8822" stroke="#884400" stroke-width="3"/>
  <!-- Big yellow eyes with pupils -->
  <circle cx="172" cy="158" r="24" fill="#FFD700" stroke="#1A5A1A" stroke-width="4"/>
  <circle cx="228" cy="158" r="24" fill="#FFD700" stroke="#1A5A1A" stroke-width="4"/>
  <ellipse cx="172" cy="158" rx="10" ry="18" fill="#1A1A1A"/>
  <ellipse cx="228" cy="158" rx="10" ry="18" fill="#1A1A1A"/>
  <circle cx="167" cy="150" r="5" fill="white"/>
  <circle cx="223" cy="150" r="5" fill="white"/>
  <!-- Nostrils -->
  <ellipse cx="188" cy="185" rx="7" ry="5" fill="#1A5A1A"/>
  <ellipse cx="212" cy="185" rx="7" ry="5" fill="#1A5A1A"/>
  <!-- Snout -->
  <ellipse cx="200" cy="188" rx="30" ry="18" fill="#55CC55" stroke="#1A5A1A" stroke-width="3"/>
  <!-- Mouth line with smile -->
  <path d="M175,200 Q200,215 225,200" stroke="#1A5A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Orange flame from mouth -->
  <path d="M200,205 Q175,225 168,250 Q178,238 188,245 Q182,265 195,270 Q200,255 205,265 Q215,270 212,250 Q222,242 218,228 Q228,235 230,225 Q220,210 200,205 Z" fill="#FF6600" stroke="#CC3300" stroke-width="2"/>
  <!-- Flame inner yellow -->
  <path d="M200,212 Q185,228 183,245 Q190,236 196,242 Q193,255 200,258 Q207,250 209,258 Q215,248 210,240 Q217,235 215,225 Q208,230 200,212 Z" fill="#FFD700" opacity="0.8"/>
</svg>
