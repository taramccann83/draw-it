<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Sky -->
  <rect width="400" height="400" fill="#D6EEFF"/>
  <!-- Ground/grass -->
  <rect x="0" y="330" width="400" height="70" fill="#5CB85C"/>
  <ellipse cx="200" cy="330" rx="210" ry="12" fill="#4CAF50"/>
  <!-- House walls -->
  <rect x="75" y="210" width="250" height="130" fill="#F5DEB3" stroke="#4A3000" stroke-width="4"/>
  <!-- Red triangular roof -->
  <polygon points="55,215 200,80 345,215" fill="#CC2222" stroke="#880000" stroke-width="4" stroke-linejoin="round"/>
  <!-- Roof overhang detail -->
  <line x1="55" y1="215" x2="345" y2="215" stroke="#880000" stroke-width="4"/>
  <!-- Chimney -->
  <rect x="265" y="110" width="40" height="80" fill="#BB7733" stroke="#6B3A00" stroke-width="4"/>
  <!-- Chimney bricks -->
  <line x1="265" y1="130" x2="305" y2="130" stroke="#6B3A00" stroke-width="2"/>
  <line x1="265" y1="150" x2="305" y2="150" stroke="#6B3A00" stroke-width="2"/>
  <line x1="265" y1="170" x2="305" y2="170" stroke="#6B3A00" stroke-width="2"/>
  <line x1="285" y1="110" x2="285" y2="130" stroke="#6B3A00" stroke-width="2"/>
  <line x1="285" y1="150" x2="285" y2="170" stroke="#6B3A00" stroke-width="2"/>
  <!-- Smoke puffs -->
  <circle cx="278" cy="98" r="10" fill="#DDDDDD" opacity="0.8"/>
  <circle cx="291" cy="88" r="13" fill="#CCCCCC" opacity="0.7"/>
  <circle cx="303" cy="95" r="9" fill="#DDDDDD" opacity="0.6"/>
  <circle cx="295" cy="78" r="11" fill="#BBBBBB" opacity="0.5"/>
  <!-- Brown wooden door -->
  <rect x="165" y="265" width="70" height="75" rx="5" ry="35" fill="#8B4513" stroke="#4A2000" stroke-width="4"/>
  <!-- Door top arch -->
  <path d="M165,290 Q165,265 200,265 Q235,265 235,290" fill="#8B4513" stroke="#4A2000" stroke-width="4"/>
  <!-- Door knob -->
  <circle cx="226" cy="307" r="5" fill="#FFD700" stroke="#CC8800" stroke-width="2"/>
  <!-- Door panel lines -->
  <line x1="180" y1="280" x2="220" y2="280" stroke="#4A2000" stroke-width="2"/>
  <line x1="180" y1="308" x2="220" y2="308" stroke="#4A2000" stroke-width="2"/>
  <!-- Left window -->
  <rect x="90" y="230" width="65" height="60" rx="4" fill="#AEE4FF" stroke="#4A3000" stroke-width="4"/>
  <!-- Window panes -->
  <line x1="122" y1="230" x2="122" y2="290" stroke="#4A3000" stroke-width="3"/>
  <line x1="90" y1="260" x2="155" y2="260" stroke="#4A3000" stroke-width="3"/>
  <!-- Left window shutters -->
  <rect x="78" y="229" width="14" height="62" rx="2" fill="#CC5500" stroke="#4A3000" stroke-width="3"/>
  <rect x="155" y="229" width="14" height="62" rx="2" fill="#CC5500" stroke="#4A3000" stroke-width="3"/>
  <!-- Right window -->
  <rect x="245" y="230" width="65" height="60" rx="4" fill="#AEE4FF" stroke="#4A3000" stroke-width="4"/>
  <!-- Window panes -->
  <line x1="277" y1="230" x2="277" y2="290" stroke="#4A3000" stroke-width="3"/>
  <line x1="245" y1="260" x2="310" y2="260" stroke="#4A3000" stroke-width="3"/>
  <!-- Right window shutters -->
  <rect x="233" y="229" width="14" height="62" rx="2" fill="#CC5500" stroke="#4A3000" stroke-width="3"/>
  <rect x="310" y="229" width="14" height="62" rx="2" fill="#CC5500" stroke="#4A3000" stroke-width="3"/>
  <!-- Green bushes at base -->
  <ellipse cx="100" cy="335" rx="40" ry="28" fill="#2E8B22" stroke="#1A5C12" stroke-width="3"/>
  <ellipse cx="75" cy="340" rx="30" ry="22" fill="#3AA030" stroke="#1A5C12" stroke-width="3"/>
  <ellipse cx="125" cy="340" rx="30" ry="22" fill="#3AA030" stroke="#1A5C12" stroke-width="3"/>
  <ellipse cx="300" cy="335" rx="40" ry="28" fill="#2E8B22" stroke="#1A5C12" stroke-width="3"/>
  <ellipse cx="275" cy="340" rx="30" ry="22" fill="#3AA030" stroke="#1A5C12" stroke-width="3"/>
  <ellipse cx="325" cy="340" rx="30" ry="22" fill="#3AA030" stroke="#1A5C12" stroke-width="3"/>
</svg>
