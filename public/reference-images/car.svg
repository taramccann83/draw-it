<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Car body (main lower section) -->
  <rect x="30" y="240" width="340" height="100" rx="20" ry="20" fill="#3399FF" stroke="#003399" stroke-width="5"/>
  <!-- Car body (upper cabin) -->
  <path d="M85,240 Q100,170 140,155 L280,155 Q315,168 320,240 Z" fill="#3399FF" stroke="#003399" stroke-width="5"/>
  <!-- Windshield -->
  <path d="M105,238 Q115,178 145,163 L185,163 L185,238 Z" fill="#AADDFF" stroke="#003399" stroke-width="3"/>
  <!-- Side window -->
  <rect x="185" y="163" width="105" height="75" rx="5" fill="#AADDFF" stroke="#003399" stroke-width="3"/>
  <!-- Rear window -->
  <path d="M290,238 Q295,178 305,170 L315,175 L318,238 Z" fill="#AADDFF" stroke="#003399" stroke-width="3"/>
  <!-- Window division line -->
  <line x1="185" y1="163" x2="185" y2="238" stroke="#003399" stroke-width="3"/>
  <!-- Door line on body -->
  <line x1="185" y1="240" x2="185" y2="340" stroke="#003399" stroke-width="3"/>
  <!-- Door handle left -->
  <rect x="135" y="285" width="35" height="10" rx="5" fill="#AADDFF" stroke="#003399" stroke-width="2"/>
  <!-- Door handle right -->
  <rect x="220" y="285" width="35" height="10" rx="5" fill="#AADDFF" stroke="#003399" stroke-width="2"/>
  <!-- Left wheel -->
  <circle cx="100" cy="345" r="45" fill="#1A1A1A" stroke="#000000" stroke-width="4"/>
  <circle cx="100" cy="345" r="30" fill="#444444" stroke="#222222" stroke-width="3"/>
  <circle cx="100" cy="345" r="15" fill="#CCCCCC" stroke="#888888" stroke-width="3"/>
  <!-- Wheel spokes left -->
  <line x1="100" y1="318" x2="100" y2="372" stroke="#888888" stroke-width="3"/>
  <line x1="73" y1="345" x2="127" y2="345" stroke="#888888" stroke-width="3"/>
  <line x1="81" y1="326" x2="119" y2="364" stroke="#888888" stroke-width="3"/>
  <line x1="81" y1="364" x2="119" y2="326" stroke="#888888" stroke-width="3"/>
  <!-- Right wheel -->
  <circle cx="300" cy="345" r="45" fill="#1A1A1A" stroke="#000000" stroke-width="4"/>
  <circle cx="300" cy="345" r="30" fill="#444444" stroke="#222222" stroke-width="3"/>
  <circle cx="300" cy="345" r="15" fill="#CCCCCC" stroke="#888888" stroke-width="3"/>
  <!-- Wheel spokes right -->
  <line x1="300" y1="318" x2="300" y2="372" stroke="#888888" stroke-width="3"/>
  <line x1="273" y1="345" x2="327" y2="345" stroke="#888888" stroke-width="3"/>
  <line x1="281" y1="326" x2="319" y2="364" stroke="#888888" stroke-width="3"/>
  <line x1="281" y1="364" x2="319" y2="326" stroke="#888888" stroke-width="3"/>
  <!-- Antenna -->
  <line x1="308" y1="155" x2="315" y2="115" stroke="#003399" stroke-width="4" stroke-linecap="round"/>
  <circle cx="315" cy="112" r="5" fill="#FF3333" stroke="#CC0000" stroke-width="2"/>
  <!-- Round headlight -->
  <circle cx="55" cy="280" r="20" fill="#FFFFAA" stroke="#003399" stroke-width="4"/>
  <circle cx="55" cy="280" r="12" fill="#FFFF44" stroke="#AAAA00" stroke-width="2"/>
  <!-- Smiling front bumper -->
  <path d="M30,315 Q55,340 80,320" stroke="#AADDFF" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Rear light -->
  <rect x="348" y="265" width="22" height="28" rx="5" fill="#FF4444" stroke="#880000" stroke-width="3"/>
  <!-- Exhaust pipe -->
  <rect x="340" y="328" width="35" height="10" rx="5" fill="#888888" stroke="#444444" stroke-width="2"/>
</svg>
