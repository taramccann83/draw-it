  <line x1="233" y1="220" x2="233" y2="289" stroke="#8B0000" stroke-width="2" opacity="0.5"/>
  <line x1="246" y1="222" x2="247" y2="288" stroke="#8B0000" stroke-width="2" opacity="0.5"/>
