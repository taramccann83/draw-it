<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Left wheel -->
  <circle cx="95" cy="280" r="80" fill="none" stroke="#1A1A1A" stroke-width="10"/>
  <!-- Left wheel inner ring -->
  <circle cx="95" cy="280" r="65" fill="none" stroke="#333333" stroke-width="4"/>
  <!-- Left hub -->
  <circle cx="95" cy="280" r="12" fill="#888888" stroke="#444444" stroke-width="3"/>
  <!-- Left spokes -->
  <line x1="95" y1="200" x2="95" y2="360" stroke="#666666" stroke-width="3"/>
  <line x1="15" y1="280" x2="175" y2="280" stroke="#666666" stroke-width="3"/>
  <line x1="38" y1="223" x2="152" y2="337" stroke="#666666" stroke-width="3"/>
  <line x1="152" y1="223" x2="38" y2="337" stroke="#666666" stroke-width="3"/>
  <line x1="20" y1="252" x2="170" y2="308" stroke="#666666" stroke-width="2"/>
  <line x1="20" y1="308" x2="170" y2="252" stroke="#666666" stroke-width="2"/>
  <!-- Right wheel -->
  <circle cx="305" cy="280" r="80" fill="none" stroke="#1A1A1A" stroke-width="10"/>
  <!-- Right wheel inner ring -->
  <circle cx="305" cy="280" r="65" fill="none" stroke="#333333" stroke-width="4"/>
  <!-- Right hub -->
  <circle cx="305" cy="280" r="12" fill="#888888" stroke="#444444" stroke-width="3"/>
  <!-- Right spokes -->
  <line x1="305" y1="200" x2="305" y2="360" stroke="#666666" stroke-width="3"/>
  <line x1="225" y1="280" x2="385" y2="280" stroke="#666666" stroke-width="3"/>
  <line x1="248" y1="223" x2="362" y2="337" stroke="#666666" stroke-width="3"/>
  <line x1="362" y1="223" x2="248" y2="337" stroke="#666666" stroke-width="3"/>
  <line x1="230" y1="252" x2="380" y2="308" stroke="#666666" stroke-width="2"/>
  <line x1="230" y1="308" x2="380" y2="252" stroke="#666666" stroke-width="2"/>
  <!-- Triangular frame -->
  <!-- Bottom tube (chain stay) -->
  <line x1="95" y1="280" x2="200" y2="280" stroke="#CC2222" stroke-width="12" stroke-linecap="round"/>
  <!-- Seat tube (vertical) -->
  <line x1="200" y1="280" x2="200" y2="180" stroke="#CC2222" stroke-width="12" stroke-linecap="round"/>
  <!-- Top tube (horizontal) -->
  <line x1="200" y1="180" x2="280" y2="180" stroke="#CC2222" stroke-width="12" stroke-linecap="round"/>
  <!-- Down tube (diagonal) -->
  <line x1="200" y1="180" x2="305" y2="280" stroke="#CC2222" stroke-width="12" stroke-linecap="round"/>
  <!-- Seat stay (from seat to rear hub) -->
  <line x1="200" y1="200" x2="305" y2="280" stroke="#AA1111" stroke-width="8" stroke-linecap="round"/>
  <!-- Chain stay (extra) -->
  <line x1="200" y1="260" x2="95" y2="280" stroke="#AA1111" stroke-width="8" stroke-linecap="round"/>
  <!-- Fork (front, to wheel) -->
  <line x1="280" y1="180" x2="305" y2="280" stroke="#CC2222" stroke-width="10" stroke-linecap="round"/>
  <!-- Seat post -->
  <line x1="200" y1="175" x2="185" y2="148" stroke="#AA1111" stroke-width="10" stroke-linecap="round"/>
  <!-- Seat -->
  <path d="M162,145 Q185,138 208,145" stroke="#4A2A00" stroke-width="4" fill="none"/>
  <rect x="162" y="145" width="46" height="14" rx="7" fill="#8B4513" stroke="#4A2A00" stroke-width="4"/>
  <!-- Handlebars stem -->
  <line x1="280" y1="180" x2="280" y2="155" stroke="#888888" stroke-width="8" stroke-linecap="round"/>
  <!-- Handlebars cross -->
  <line x1="258" y1="155" x2="302" y2="155" stroke="#888888" stroke-width="8" stroke-linecap="round"/>
  <!-- Handlebar grips -->
  <rect x="252" y="148" width="14" height="18" rx="7" fill="#222222" stroke="#000000" stroke-width="3"/>
  <rect x="296" y="148" width="14" height="18" rx="7" fill="#222222" stroke="#000000" stroke-width="3"/>
  <!-- Bell on handlebars -->
  <circle cx="295" cy="148" r="8" fill="#FFD700" stroke="#CC8800" stroke-width="2"/>
  <ellipse cx="295" cy="145" rx="6" ry="4" fill="#FFA500" stroke="#CC8800" stroke-width="1.5"/>
  <!-- Pedal crank and pedals -->
  <circle cx="200" cy="265" r="14" fill="#888888" stroke="#444444" stroke-width="3"/>
  <line x1="200" y1="265" x2="225" y2="250" stroke="#666666" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="265" x2="175" y2="280" stroke="#666666" stroke-width="6" stroke-linecap="round"/>
  <rect x="222" y="244" width="22" height="8" rx="3" fill="#333333" stroke="#111111" stroke-width="2"/>
  <rect x="157" y="276" width="22" height="8" rx="3" fill="#333333" stroke="#111111" stroke-width="2"/>
  <!-- Chain area (simple ellipse hint) -->
  <ellipse cx="152" cy="275" rx="28" ry="12" fill="none" stroke="#555555" stroke-width="3" opacity="0.5"/>
</svg>
