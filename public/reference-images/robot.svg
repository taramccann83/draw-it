<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Left leg -->
  <rect x="140" y="310" width="48" height="75" rx="8" fill="#AAAAAA" stroke="#333333" stroke-width="4"/>
  <!-- Left foot -->
  <rect x="128" y="370" width="68" height="22" rx="6" fill="#888888" stroke="#333333" stroke-width="4"/>
  <!-- Right leg -->
  <rect x="212" y="310" width="48" height="75" rx="8" fill="#AAAAAA" stroke="#333333" stroke-width="4"/>
  <!-- Right foot -->
  <rect x="204" y="370" width="68" height="22" rx="6" fill="#888888" stroke="#333333" stroke-width="4"/>
  <!-- Left arm -->
  <rect x="62" y="178" width="50" height="100" rx="12" fill="#AAAAAA" stroke="#333333" stroke-width="4"/>
  <!-- Left hand/claw -->
  <rect x="55" y="270" width="64" height="30" rx="10" fill="#888888" stroke="#333333" stroke-width="4"/>
  <!-- Right arm -->
  <rect x="288" y="178" width="50" height="100" rx="12" fill="#AAAAAA" stroke="#333333" stroke-width="4"/>
  <!-- Right hand/claw -->
  <rect x="281" y="270" width="64" height="30" rx="10" fill="#888888" stroke="#333333" stroke-width="4"/>
  <!-- Body (rectangular) -->
  <rect x="108" y="175" width="184" height="145" rx="12" fill="#BBBBBB" stroke="#333333" stroke-width="5"/>
  <!-- Body bolts in corners -->
  <circle cx="125" cy="192" r="8" fill="#888888" stroke="#444444" stroke-width="3"/>
  <circle cx="275" cy="192" r="8" fill="#888888" stroke="#444444" stroke-width="3"/>
  <circle cx="125" cy="303" r="8" fill="#888888" stroke="#444444" stroke-width="3"/>
  <circle cx="275" cy="303" r="8" fill="#888888" stroke="#444444" stroke-width="3"/>
  <!-- Chest panel -->
  <rect x="132" y="215" width="136" height="88" rx="8" fill="#999999" stroke="#444444" stroke-width="3"/>
  <!-- Panel buttons (red, yellow, green) -->
  <circle cx="162" cy="238" r="14" fill="#FF3333" stroke="#880000" stroke-width="3"/>
  <circle cx="200" cy="238" r="14" fill="#FFD700" stroke="#AA8800" stroke-width="3"/>
  <circle cx="238" cy="238" r="14" fill="#33CC33" stroke="#006600" stroke-width="3"/>
  <!-- Panel display/grid at bottom of chest -->
  <rect x="148" y="265" width="104" height="28" rx="5" fill="#444488" stroke="#222255" stroke-width="2"/>
  <line x1="174" y1="265" x2="174" y2="293" stroke="#6666BB" stroke-width="1.5"/>
  <line x1="200" y1="265" x2="200" y2="293" stroke="#6666BB" stroke-width="1.5"/>
  <line x1="226" y1="265" x2="226" y2="293" stroke="#6666BB" stroke-width="1.5"/>
  <line x1="148" y1="279" x2="252" y2="279" stroke="#6666BB" stroke-width="1.5"/>
  <!-- Neck connector -->
  <rect x="178" y="155" width="44" height="24" rx="6" fill="#999999" stroke="#333333" stroke-width="4"/>
  <!-- Head (square) -->
  <rect x="110" y="65" width="180" height="100" rx="14" fill="#BBBBBB" stroke="#333333" stroke-width="5"/>
  <!-- Head bolts in corners -->
  <circle cx="127" cy="82" r="7" fill="#888888" stroke="#444444" stroke-width="2"/>
  <circle cx="273" cy="82" r="7" fill="#888888" stroke="#444444" stroke-width="2"/>
  <circle cx="127" cy="148" r="7" fill="#888888" stroke="#444444" stroke-width="2"/>
  <circle cx="273" cy="148" r="7" fill="#888888" stroke="#444444" stroke-width="2"/>
  <!-- Big rectangular glowing eyes (light blue) -->
  <rect x="130" y="85" width="60" height="40" rx="8" fill="#88DDFF" stroke="#0088CC" stroke-width="4"/>
  <rect x="210" y="85" width="60" height="40" rx="8" fill="#88DDFF" stroke="#0088CC" stroke-width="4"/>
  <!-- Eye glow inner -->
  <rect x="138" y="92" width="44" height="26" rx="5" fill="#AAEEFF" opacity="0.7"/>
  <rect x="218" y="92" width="44" height="26" rx="5" fill="#AAEEFF" opacity="0.7"/>
  <!-- Eye highlight dots -->
  <circle cx="148" cy="100" r="5" fill="white" opacity="0.9"/>
  <circle cx="228" cy="100" r="5" fill="white" opacity="0.9"/>
  <!-- Grid mouth (smile made of grid blocks) -->
  <rect x="145" y="138" width="110" height="20" rx="5" fill="#555555" stroke="#222222" stroke-width="3"/>
  <!-- Grid mouth blocks - smile pattern -->
  <rect x="148" y="141" width="12" height="14" rx="2" fill="#888888"/>
  <rect x="164" y="141" width="12" height="14" rx="2" fill="#AADDFF"/>
  <rect x="180" y="138" width="12" height="17" rx="2" fill="#AADDFF"/>
  <rect x="196" y="138" width="12" height="17" rx="2" fill="#AADDFF"/>
  <rect x="212" y="141" width="12" height="14" rx="2" fill="#AADDFF"/>
  <rect x="228" y="141" width="12" height="14" rx="2" fill="#888888"/>
  <!-- Antenna on top of head -->
  <line x1="200" y1="65" x2="200" y2="32" stroke="#666666" stroke-width="6" stroke-linecap="round"/>
  <circle cx="200" cy="26" r="12" fill="#FF4444" stroke="#880000" stroke-width="3"/>
  <!-- Antenna glow -->
  <circle cx="200" cy="26" r="7" fill="#FF8888"/>
</svg>
