<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Water hint background -->
  <rect width="400" height="400" fill="#D0F0FF"/>
  <!-- Wavy water lines -->
  <path d="M0,370 Q50,360 100,370 Q150,380 200,370 Q250,360 300,370 Q350,380 400,370" stroke="#88CCEE" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M0,385 Q50,375 100,385 Q150,395 200,385 Q250,375 300,385 Q350,395 400,385" stroke="#88CCEE" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Fan-shaped tail fin -->
  <path d="M295,200 L370,150 L385,200 L370,250 Z" fill="#FF8C00" stroke="#8B3A00" stroke-width="4" stroke-linejoin="round"/>
  <!-- Tail fin veins -->
  <line x1="295" y1="200" x2="368" y2="155" stroke="#CC5500" stroke-width="2"/>
  <line x1="295" y1="200" x2="383" y2="200" stroke="#CC5500" stroke-width="2"/>
  <line x1="295" y1="200" x2="368" y2="245" stroke="#CC5500" stroke-width="2"/>
  <!-- Main oval body -->
  <ellipse cx="195" cy="200" rx="130" ry="90" fill="#FF7722" stroke="#8B3A00" stroke-width="5"/>
  <!-- Scale pattern (curved lines in rows) -->
  <path d="M145,165 Q160,155 175,165" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M170,165 Q185,155 200,165" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M195,165 Q210,155 225,165" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M220,168 Q235,158 250,168" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M130,185 Q145,175 160,185" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M155,182 Q170,172 185,182" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M180,182 Q195,172 210,182" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M205,183 Q220,173 235,183" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M230,185 Q245,175 260,185" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M250,188 Q265,178 280,188" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M145,205 Q160,195 175,205" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M170,203 Q185,193 200,203" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M195,203 Q210,193 225,203" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M220,205 Q235,195 250,205" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M130,220 Q145,210 160,220" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M155,218 Q170,208 185,218" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M180,218 Q195,208 210,218" stroke="#CC5500" stroke-width="2" fill="none"/>
  <path d="M205,220 Q220,210 235,220" stroke="#CC5500" stroke-width="2" fill="none"/>
  <!-- Triangular dorsal fin on top -->
  <path d="M165,115 L185,160 L255,155 L245,118 Z" fill="#FF9933" stroke="#8B3A00" stroke-width="4" stroke-linejoin="round"/>
  <!-- Dorsal fin veins -->
  <line x1="185" y1="158" x2="175" y2="120" stroke="#CC5500" stroke-width="2"/>
  <line x1="210" y1="157" x2="210" y2="120" stroke="#CC5500" stroke-width="2"/>
  <line x1="235" y1="156" x2="243" y2="122" stroke="#CC5500" stroke-width="2"/>
  <!-- Small pectoral fin -->
  <path d="M210,220 Q235,240 220,258 Q200,248 210,220 Z" fill="#FF9933" stroke="#8B3A00" stroke-width="3"/>
  <!-- Big round eye with white highlight -->
  <circle cx="120" cy="188" r="30" fill="white" stroke="#8B3A00" stroke-width="5"/>
  <circle cx="120" cy="188" r="20" fill="#1A1A1A"/>
  <circle cx="112" cy="180" r="7" fill="white"/>
  <!-- Smiling mouth -->
  <path d="M78,205 Q90,222 100,210" stroke="#8B3A00" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Bubbles near mouth -->
  <circle cx="62" cy="195" r="8" fill="none" stroke="#0088CC" stroke-width="3"/>
  <circle cx="48" cy="178" r="11" fill="none" stroke="#0088CC" stroke-width="3"/>
  <circle cx="35" cy="160" r="7" fill="none" stroke="#0088CC" stroke-width="3"/>
  <circle cx="55" cy="162" r="5" fill="none" stroke="#0088CC" stroke-width="2"/>
</svg>
