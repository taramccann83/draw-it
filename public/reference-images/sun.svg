<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Sun rays - alternating long and short, all around -->
  <!-- Long rays -->
  <line x1="200" y1="200" x2="200" y2="40" stroke="#FFA500" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="200" y2="360" stroke="#FFA500" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="40" y2="200" stroke="#FFA500" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="360" y2="200" stroke="#FFA500" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="87" y2="87" stroke="#FFA500" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="313" y2="87" stroke="#FFA500" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="87" y2="313" stroke="#FFA500" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="313" y2="313" stroke="#FFA500" stroke-width="8" stroke-linecap="round"/>
  <!-- Short rays -->
  <line x1="200" y1="200" x2="250" y2="60" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="150" y2="60" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="340" y2="150" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="340" y2="250" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="250" y2="340" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="150" y2="340" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="60" y2="250" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="60" y2="150" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  <!-- Sun circle body -->
  <circle cx="200" cy="200" r="105" fill="#FFE033" stroke="#FFA500" stroke-width="5"/>
  <!-- Happy face -->
  <!-- Eyes -->
  <circle cx="170" cy="185" r="12" fill="#5C3000"/>
  <circle cx="230" cy="185" r="12" fill="#5C3000"/>
  <circle cx="174" cy="181" r="4" fill="white"/>
  <circle cx="234" cy="181" r="4" fill="white"/>
  <!-- Big smile -->
  <path d="M160,220 Q200,255 240,220" stroke="#5C3000" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <ellipse cx="148" cy="215" rx="20" ry="14" fill="#FF9944" opacity="0.5"/>
  <ellipse cx="252" cy="215" rx="20" ry="14" fill="#FF9944" opacity="0.5"/>
  <!-- Eyebrows (happy raised) -->
  <path d="M158,168 Q170,160 182,168" stroke="#5C3000" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M218,168 Q230,160 242,168" stroke="#5C3000" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
