  <rect x="200" y="194" width="14" height="5" rx="2" fill="#FF88AA" transform="rotate(-20 207 196)"/>
  <rect x="205" y="162" width="14" height="5" rx="2" fill="#FF4444" transform="rotate(55 212 164)"/>
  <rect x="183" y="183" width="14" height="5" rx="2" fill="#44AAFF" transform="rotate(-15 190 185)"/>
